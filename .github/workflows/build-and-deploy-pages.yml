name: Build and Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      project_folder:
        description: 'The folder containing the project to build'
        required: true
        type: string
      output_folder:
        description: 'The folder containing the built output (relative to project_folder)'
        required: true
        type: string
      target_branch:
        description: 'The branch to deploy to GitHub Pages'
        required: false
        type: string
        default: 'Pages'
      node_version:
        description: 'Node.js version to use for building'
        required: false
        type: string
        default: '24'
      build_command:
        description: 'The build command to run'
        required: false
        type: string
        default: 'npm run build'
      install_command:
        description: 'The install command to run'
        required: false
        type: string
        default: 'npm ci'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.project_folder }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_folder }}
        run: ${{ inputs.install_command }}

      - name: Build project
        working-directory: ${{ inputs.project_folder }}
        run: ${{ inputs.build_command }}

      # Option 1: Use GitHub Pages action (for pre-configured repositories)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ inputs.project_folder }}/${{ inputs.output_folder }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
